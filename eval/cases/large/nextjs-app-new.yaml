id: large-nextjs-app-new
title: New Next.js app
profile: nextjs
style: default
intent: new
prompt: "Create a polished browser game as a Next.js app that can run on port 3011."
expected_artifacts:
  - package.json
  - app/page.tsx
verify:
  - npm run build
success_check:
  type: semantic
  required_paths:
    - package.json
    - app/page.tsx
  must_include:
    package.json:
      - next build
    app/page.tsx:
      - export default
